---
- name: Setup Prometheus e Grafana
  hosts: servidores_web
  become: yes
  tasks:
    - name: 1. Criar pastas de monitoramento
      file:
        path: "{{ item }}"
        state: directory
        owner: sre
        group: sre
      loop:
        - /home/sre/monitoring
        - /home/sre/monitoring/prometheus

    - name: 2. Criar configuração do Prometheus
      copy:
        dest: /home/sre/monitoring/prometheus/prometheus.yml
        content: |
          global:
            scrape_interval: 15s

          scrape_configs:
            - job_name: 'prometheus'
              static_configs:
                - targets: ['localhost:9090']

            - job_name: 'node_exporter'
              static_configs:
                - targets: ['node-exporter:9100']

            - job_name: 'minha_app'
              static_configs:
                - targets: ['projeto-app-app-1:8080']
